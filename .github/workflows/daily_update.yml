name: Daily AI Chain Update

on:
  schedule:
    - cron: "0 8 * * *"   # 每天 UTC 8:00（北京时间 16:00）
  workflow_dispatch:        # 支持手动触发

permissions:
  contents: write           # 允许 push 回 repo

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}       # 可选
          MAX_ARTICLES_PER_RUN: "15"
          DATA_DIR: ./data
        run: python backend/pipeline.py

      - name: Upload pipeline log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-log-${{ github.run_id }}
          path: backend/pipeline.log
          retention-days: 7
